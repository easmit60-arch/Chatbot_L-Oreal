<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L'Oreal Beauty Assistant</title>
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="page-wrapper">
      <!------- Header / Branding ------->
      <header class="site-header">
        <img src="img/loreal-logo.png" alt="L'Oreal logo" class="brand-logo" />
        <h1 class="site-title">L'Oreal Beauty Assistant</h1>
        <p class="site-tagline">
          Personalized routines and product guidance from the L'Oréal ecosystem.
        </p>
      </header>

      <!------- Chat Area ------->
      <main>
        <section class="chatbox">
          <div class="latest-question-box" aria-live="polite">
            <p class="latest-question-label">Latest question</p>
            <p id="latestQuestion" class="latest-question-text">
              Your latest question will appear here.
            </p>
          </div>

          <div id="chatWindow" class="chat-window">
            <!-- messages will be appended here via JS -->
          </div>

          <form id="chatForm" class="chat-form">
            <label for="userInput" class="visually-hidden">Message</label>
            <input
              id="userInput"
              name="userInput"
              type="text"
              placeholder="Ask me about products or routines…"
              autocomplete="off"
              required
            />
            <button type="submit" id="sendBtn">
              <span class="material-icons">send</span>
              <span class="visually-hidden">Send</span>
            </button>
          </form>
        </section>
      </main>

      <!------- Footer Links ------->
      <footer class="site-footer">
        <p>&copy; 2026 L'Oréal Chatbot Project.</p>
        <nav>
          <a href="#" aria-label="Privacy policy link">Privacy Policy</a>
          <a href="#" aria-label="Terms of use link">Terms of Use</a>
          <a href="#" aria-label="Contact link">Contact</a>
        </nav>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
